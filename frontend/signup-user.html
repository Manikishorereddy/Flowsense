<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowSense AI - Create Account</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p>Register as a user to get started</p>
        </div>
        
        <form id="authForm" class="auth-form">
            <div id="errorMsg" style="color: #ff4b4b; font-size: 14px; margin-bottom: 12px; display: none;"></div>
            <div class="input-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Enter full name" required>
            </div>
            <div class="input-group">
                <label for="location">Location</label>
                <input type="text" id="location" placeholder="Enter location (e.g. Downtown, NY)" required>
            </div>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter email address" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password" required>
            </div>
            
            <button type="submit" class="primary-btn">Create Account</button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="login-user.html">Login</a></p>
        </div>
    </div>
    
    <script>
        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const location = document.getElementById('location').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            fetch('http://localhost/flowsense%20backend/api/user/signup.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ full_name: fullName, location: location, email: email, password: password })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    localStorage.setItem('userId', data.id);
                    localStorage.setItem('fullName', fullName);
                    localStorage.setItem('location', location);
                    localStorage.setItem('email', email);
                    window.location.href = 'user-home.html';
                } else {
                    errorMsg.innerText = data.message;
                    errorMsg.style.display = 'block';
                }
            })
            .catch(err => {
                errorMsg.innerText = "Connection error. Please try again.";
                errorMsg.style.display = 'block';
            });
        });
    </script>
</body>
</html>
