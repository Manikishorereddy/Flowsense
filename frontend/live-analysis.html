<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Analysis</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .live-analysis-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: #0D101E;
        }
        .live-analysis-header h2 {
            color: #FFF;
            font-size: 18px;
            font-weight: 700;
        }
        .back-btn {
            color: #8C92A6;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .video-container {
            position: relative;
            width: 100%;
            height: 240px;
            background: #000;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }
        .overlay-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.6);
            color: #FF4D4D;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .overlay-cam {
            position: absolute;
            top: 12px;
            left: 70px;
            background: rgba(0,0,0,0.6);
            color: #1CB5E0;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
        }
        /* Simulated Bounding Box */
        .bounding-box {
            position: absolute;
            border: 2px solid #1CB5E0;
            background: rgba(28, 181, 224, 0.1);
            top: 30%;
            left: 40%;
            width: 80px;
            height: 140px;
            animation: moveBox 4s infinite alternate ease-in-out;
        }
        .bounding-box::before {
            content: "Person 99%";
            position: absolute;
            top: -20px;
            left: -2px;
            background: #1CB5E0;
            color: #000;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 4px;
        }
        @keyframes moveBox {
            0% { left: 40%; }
            100% { left: 50%; }
        }
        
        .info-section {
            padding: 24px;
        }
        .info-section h3 {
            color: #FFF;
            font-size: 22px;
            margin-bottom: 4px;
        }
        .info-section p {
            color: #8C92A6;
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #141829;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1CB5E0;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .stat-value {
            color: #FFF;
            font-size: 32px;
            font-weight: 700;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .stat-value span {
            font-size: 14px;
            color: #8C92A6;
            font-weight: 400;
        }
        .stat-trend {
            color: #FF4D4D;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .density-card {
            background: #141829;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 24px;
        }
        .density-header {
            display: flex;
            justify-content: space-between;
            color: #FFF;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .density-header span:last-child {
            color: #FF4D4D;
        }
        .density-bar {
            height: 6px;
            background: #2A2D3E;
            border-radius: 3px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .density-fill {
            height: 100%;
            width: 85%;
            background: linear-gradient(90deg, #1CB5E0, #F2C94C, #FF4D4D);
            border-radius: 3px;
        }
        .density-desc {
            color: #8C92A6;
            font-size: 12px;
            line-height: 1.5;
        }

        .recommendation-card {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            gap: 16px;
        }
        .rec-icon {
            width: 40px;
            height: 40px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .rec-content h4 {
            color: #FFF;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .rec-content p {
            color: #C4B5FD;
            font-size: 12px;
            margin: 0;
            line-height: 1.5;
        }
    </style>
</head>
<body style="background: #060714;">
    <div class="dashboard-container" style="margin: 0 auto; height: 100vh; display: flex; flex-direction: column; overflow: hidden;">
        
        <div class="live-analysis-header">
            <div class="back-btn" onclick="window.history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </div>
            <h2>Live Analysis</h2>

        </div>

        <div style="display: flex; flex-direction: row; gap: 32px; padding: 32px; flex: 1; overflow: hidden;">
            <div class="video-container" style="flex: 2; height: 100%; border-radius: 16px; overflow: hidden;">
                <video id="videoPlayer" loop autoplay muted playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
                <div class="overlay-badge">
                    <div style="width:6px;height:6px;background:#FF4D4D;border-radius:50%;"></div> REC
                </div>
                <div class="overlay-cam" id="camLabel">CAM_04_MAIN</div>
            </div>

            <div class="info-section" style="flex: 1; overflow-y: auto; padding: 0;">
            <h3 id="videoTitle">Loading...</h3>
            <p id="videoOrg">Main Entrance & Reception</p>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-card-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        LIVE COUNT
                    </div>
                    <div class="stat-value"><span id="liveCount">143</span> <span class="stat-trend"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg> <span id="countStatus">High</span></span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C4B5FD" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                        <span style="color:#C4B5FD">EST. WAIT</span>
                    </div>
                    <div class="stat-value"><span id="estWait">42</span> <span>mins</span></div>
                </div>
            </div>

            <div class="density-card">
                <div class="density-header">
                    <span>Crowd Density</span>
                    <span id="densityPct">85%</span>
                </div>
                <div class="density-bar">
                    <div class="density-fill" id="densityBar"></div>
                </div>
                <div class="density-desc">
                    Density is currently at peak levels. Expected to decrease to 40% in approximately 45 minutes.
                </div>
            </div>


            </div>
        </div>
    </div>
    <script>
        let analyticsData = null;

        // Extract URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const videoPath = urlParams.get('video_path');
        const title = urlParams.get('title');

        if (title) {
            document.getElementById('videoTitle').textContent = title;
            document.getElementById('camLabel').textContent = "CAM: " + title.substring(0, 10).toUpperCase();
        }

        const video = document.getElementById('videoPlayer');
        if (videoPath) {
            const baseUrl = 'http://localhost/flowsense%20backend/';
            const fullUrl = baseUrl + videoPath.replace('api/', '');
            video.src = fullUrl.replace(' ', '%20');
            video.loop = true;
            video.autoplay = true;

            // Fetch analytics data with polling
            const jsonUrl = `http://localhost/flowsense%20backend/api/user/get_analytics.php?path=${encodeURIComponent(videoPath)}`;
            function fetchAnalyticsData() {
                fetch(jsonUrl)
                    .then(response => {
                        if (!response.ok) throw new Error('Not found');
                        return response.json();
                    })
                    .then(data => {
                        analyticsData = data;
                    })
                    .catch(err => {
                        console.log('Analytics not available yet, retrying...');
                        setTimeout(fetchAnalyticsData, 2000);
                    });
            }
            fetchAnalyticsData();
        }

        // Sync stats with video playback
        video.ontimeupdate = function() {
            if (!analyticsData) return;
            
            const currentSec = Math.floor(video.currentTime);
            const currentData = analyticsData.find(d => d.time_sec === currentSec);
            
            if (currentData) {
                // Remove old boxes
                document.querySelectorAll('.dynamic-box').forEach(el => el.remove());

                // Draw new boxes
                if (currentData.boxes) {
                    const container = document.querySelector('.video-container');
                    currentData.boxes.forEach(box => {
                        const boxEl = document.createElement('div');
                        boxEl.className = 'dynamic-box bounding-box';
                        boxEl.style.left = (box.x * 100) + '%';
                        boxEl.style.top = (box.y * 100) + '%';
                        boxEl.style.width = (box.w * 100) + '%';
                        boxEl.style.height = (box.h * 100) + '%';
                        boxEl.style.animation = 'none'; // Disable hover animation
                        container.appendChild(boxEl);
                    });
                }

                const count = currentData.count;
                const waitTime = count * 3; // Estimate 3 mins per person
                const density = Math.min(Math.floor((count * 100) / 20), 100);

                document.getElementById('liveCount').textContent = count;
                document.getElementById('estWait').textContent = waitTime;
                
                const statusEl = document.getElementById('countStatus');
                if (count > 10) {
                    statusEl.textContent = 'High';
                    statusEl.style.color = '#ff4d4d';
                } else if (count > 5) {
                    statusEl.textContent = 'Moderate';
                    statusEl.style.color = '#f59e0b';
                } else {
                    statusEl.textContent = 'Low';
                    statusEl.style.color = '#1cb5e0';
                }

                document.getElementById('densityPct').textContent = density + '%';
                document.getElementById('densityBar').style.width = density + '%';
            }
        };
    </script>
</body>
</html>
