<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowSense AI - User Settings</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                </div>
                <h2>FlowSense</h2>
            </div>
            <div class="nav-menu">
                <a href="user-home.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    <span>Dashboard</span>
                </a>
                <a href="monitor.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>
                    <span>Monitor</span>
                </a>
                <a href="predict.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                    <span>Predict</span>
                </a>
                <a href="user-settings.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <span>Settings</span>
                </a>
            </div>
        </nav>

        <div class="main-content">
            <header class="top-bar">
                <div class="logo-area">
                    <h2>Settings</h2>
                </div>
            </header>

            <div class="settings-list">
                <div class="settings-item" onclick="window.location.href='profile.html'" style="cursor: pointer;">
                    <div class="settings-item-info">
                        <div class="settings-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#764ba2" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        </div>
                        <div>
                            <h4>Profile</h4>
                            <p>View profile details</p>
                        </div>
                    </div>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8c92a6" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>

                <div class="settings-item" onclick="window.location.href='reset-password.html'" style="cursor: pointer;">
                    <div class="settings-item-info">
                        <div class="settings-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1cb5e0" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        </div>
                        <div>
                            <h4>Reset Password</h4>
                            <p>Change your password</p>
                        </div>
                    </div>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8c92a6" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>

                <div class="settings-item" onclick="window.location.href='privacy-policy.html'" style="cursor: pointer;">
                    <div class="settings-item-info">
                        <div class="settings-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff4b4b" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                        </div>
                        <div>
                            <h4>Privacy and Policy</h4>
                            <p>Read our policies</p>
                        </div>
                    </div>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8c92a6" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>

                <div class="settings-item" onclick="window.location.href='help-support.html'" style="cursor: pointer;">
                    <div class="settings-item-info">
                        <div class="settings-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f6b93b" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                        </div>
                        <div>
                            <h4>Help and Support</h4>
                            <p>Get assistance</p>
                        </div>
                    </div>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8c92a6" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>

                <div class="settings-item" onclick="window.location.href='index.html'" style="cursor: pointer; margin-top: 16px;">
                    <div class="settings-item-info">
                        <div class="settings-icon" style="background: rgba(255, 75, 75, 0.1);">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ff4b4b" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        </div>
                        <div>
                            <h4 style="color: #ff4b4b;">Log Out</h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
