<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowSense AI - Reset Password</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-form {
            padding: 20px;
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #8c92a6;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            border-color: #1cb5e0;
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1cb5e0 0%, #000851 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="main-content">
            <header class="top-bar">
                <div class="logo-area" style="cursor: pointer;" onclick="window.history.back()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    <h2 style="margin-left: 10px;">Reset Password</h2>
                </div>
            </header>

            <div class="auth-form">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password">
                </div>
                
                <div class="form-group">
                    <label>Re-enter Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password">
                </div>
                <div id="statusMsg" style="margin-bottom: 15px; font-size: 14px;"></div>
                <button class="btn-primary" id="btnSave">Save</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('btnSave').addEventListener('click', async () => {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const statusMsg = document.getElementById('statusMsg');
            
            if (!newPassword || !confirmPassword) {
                statusMsg.innerText = "Please fill in all fields.";
                statusMsg.style.color = "#ff4b4b";
                return;
            }
            
            if (newPassword !== confirmPassword) {
                statusMsg.innerText = "Passwords do not match.";
                statusMsg.style.color = "#ff4b4b";
                return;
            }
            
            const email = localStorage.getItem('email');
            if (!email) {
                statusMsg.innerText = "Error: User email not found in session.";
                statusMsg.style.color = "#ff4b4b";
                return;
            }
            
            try {
                const response = await fetch('http://localhost/flowsense%20backend/api/user/change_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, new_password: newPassword })
                });
                
                const data = await response.json();
                if (data.status === 'success') {
                    statusMsg.innerText = "Password updated successfully!";
                    statusMsg.style.color = "#00e676";
                    setTimeout(() => window.history.back(), 1500);
                } else {
                    statusMsg.innerText = data.message || "Failed to update password.";
                    statusMsg.style.color = "#ff4b4b";
                }
            } catch (err) {
                console.error(err);
                statusMsg.innerText = "Connection error. Please try again.";
                statusMsg.style.color = "#ff4b4b";
            }
        });
    </script>
</body>
</html>
